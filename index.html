<title>HM Trainer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#fafaf9;--s0:#f5f5f4;--s1:#e7e5e4;--s2:#fff;--tx:#1c1917;--tx2:#78716c;--tx3:#a8a29e;--bd:#e7e5e4;--bds:#d6d3d1;--r:10px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
@media(prefers-color-scheme:dark){:root{--bg:#0a0a0a;--s0:#171717;--s1:#262626;--s2:#1c1c1c;--tx:#fafaf9;--tx2:#a8a29e;--tx3:#57534e;--bd:#2e2e2e;--bds:#3f3f3f}}
body{font-family:var(--font);background:var(--bg);color:var(--tx);max-width:430px;margin:0 auto;min-height:100dvh;padding:12px 16px env(safe-area-inset-bottom)}
input,textarea,button,select{font-family:var(--font);font-size:14px}
.tabs{display:flex;gap:4px;background:var(--s0);border-radius:12px;padding:4px;margin-bottom:16px}
.tab{flex:1;padding:10px 0;border:none;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;background:transparent;color:var(--tx3);transition:.2s}
.tab.on{background:var(--s2);color:var(--tx);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card{background:var(--s2);border:.5px solid var(--bd);border-radius:14px;padding:14px 16px;margin-bottom:10px}
.hero{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.hero-num{font-size:32px;font-weight:600;color:#10B981;line-height:1}
.hero-sub{font-size:12px;color:var(--tx3);margin-top:2px}
.phase-bar{display:flex;gap:3px;margin-bottom:10px}
.phase-seg{height:6px;border-radius:3px;transition:.3s}
.wk-scroll{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;padding-bottom:4px;scrollbar-width:none}
.wk-scroll::-webkit-scrollbar{display:none}
.wk-btn{flex-shrink:0;width:40px;height:40px;border-radius:12px;border:.5px solid var(--bd);background:var(--s2);font-size:13px;font-weight:400;cursor:pointer;color:var(--tx2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;transition:.15s}
.wk-btn.on{border-width:2px;font-weight:600}
.day{padding:14px 16px;border-radius:14px;border:.5px solid var(--bd);background:var(--s2);margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:.15s}
.day:active{transform:scale(.98)}
.day.done{opacity:.65}
.chk{width:30px;height:30px;border-radius:10px;border:1.5px solid var(--bds);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s}
.chk.on{border:none}
.chk.rest{opacity:.3;pointer-events:none;border-style:dashed}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;opacity:0;transition:opacity .2s;display:none}
.overlay.show{display:block;opacity:1}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--s2);border-radius:20px 20px 0 0;max-height:88dvh;overflow-y:auto;z-index:101;transform:translateY(100%);transition:transform .3s ease-out;scrollbar-width:none}
.sheet::-webkit-scrollbar{display:none}
.sheet.show{transform:translateY(0)}
.sheet-handle{display:flex;justify-content:center;padding:10px 0 4px}
.sheet-handle div{width:36px;height:4px;border-radius:2px;background:var(--bds)}
.sheet-head{margin:0 16px 16px;padding:20px;border-radius:16px;position:relative}
.zone-bar{display:flex;gap:3px;height:8px;border-radius:4px;overflow:hidden;margin-bottom:8px}
.zone-seg{flex:1;transition:.3s}
.split-row{padding:12px 16px;border-bottom:.5px solid var(--bd)}
.split-row:last-child{border-bottom:none}
.input-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.field label{font-size:11px;color:var(--tx3);display:flex;align-items:center;gap:4px;margin-bottom:4px}
.field input,.field textarea{width:100%;padding:10px 12px;border-radius:10px;border:.5px solid var(--bd);background:var(--s0);font-size:14px;font-weight:500;color:var(--tx);outline:none;transition:border .2s}
.field input:focus,.field textarea:focus{border-color:#10B981}
.field textarea{resize:none;font-size:13px;line-height:1.5}
.btn-ai{width:100%;padding:14px;border-radius:12px;border:none;font-size:14px;font-weight:500;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s}
.btn-ai:disabled{opacity:.6;cursor:wait}
.btn-done{width:100%;padding:16px;border-radius:14px;border:none;font-size:16px;font-weight:500;cursor:pointer;transition:.2s}
.analysis-box{margin-top:14px;padding:16px;border-radius:12px;font-size:13px;line-height:1.8;white-space:pre-wrap;word-break:break-word}
.badge-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.badge{padding:16px 14px;border-radius:14px;border:.5px solid var(--bd);background:var(--s2);text-align:center;transition:.3s}
.badge.on{border:1.5px solid #F59E0B}
.badge.off{opacity:.4}
.badge .icon{font-size:32px;margin-bottom:6px}
.badge.off .icon{filter:grayscale(1)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.stat-card{background:var(--s2);border-radius:14px;padding:18px 16px;border:.5px solid var(--bd)}
.stat-card .num{font-size:28px;font-weight:500}
.stat-card .lbl{font-size:12px;color:var(--tx3);margin-top:2px}
.vol-chart{display:flex;align-items:flex-end;gap:4px;height:100px}
.vol-bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.vol-bg{width:100%;border-radius:4px;background:var(--s0);position:relative;overflow:hidden}
.vol-fill{position:absolute;bottom:0;width:100%;border-radius:4px;transition:height .5s}
.toast{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;justify-content:center;pointer-events:none;animation:slideDown .4s ease-out}
.toast-inner{margin:16px;padding:14px 20px;background:var(--s2);border:2px solid #F59E0B;border-radius:16px;display:flex;align-items:center;gap:14px;box-shadow:0 12px 40px rgba(0,0,0,.2);max-width:340px;width:100%}
@keyframes slideDown{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spinner{width:16px;height:16px;border:2px solid var(--bds);border-top-color:transparent;border-radius:50%;display:inline-block;animation:spin .8s linear infinite}
.upload-btn{width:100%;padding:14px;border-radius:10px;border:1.5px dashed var(--bds);background:var(--s0);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;color:var(--tx2);transition:.2s}
.upload-btn.has{border-style:solid;border-color:#10B981;color:#10B981;background:#10B98110}
.prepost-item{padding:12px 16px;border-bottom:.5px solid var(--bd);display:flex;gap:12px;align-items:flex-start}
.prepost-item:last-child{border-bottom:none}
.prepost-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;margin-top:1px}
.ring{position:relative;width:48px;height:48px}
.ring svg{width:48px;height:48px}
.ring span{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500}
</style>
</head>

let state={week:1,tab:"plan",completed:{},stats:{},analyses:{},apiKey:""};
try{
  const s=localStorage.getItem("hm-state-v3");
  if(s){const p=JSON.parse(s);Object.assign(state,p)}
}catch{}
function save(){try{localStorage.setItem("hm-state-v3",JSON.stringify(state))}catch{}}

function getPhase(w){return PH.find(p=>p.w.includes(w))}
function getCompKm(){return Object.keys(state.completed).reduce((a,k)=>{const[w,d]=k.split("-").map(Number);return a+(SCH[w]?.[d]?.km||0)},0)}
function getCompCount(){return Object.keys(state.completed).length}

function getEarned(){
  const b=[],ck=getCompKm(),cc=getCompCount();
  if(cc>=1)b.push("first");
  [10,25,50,100,200,300].forEach((v,i)=>{if(ck>=v)b.push("s"+v)});
  for(let w=1;w<=13;w++){if(SCH[w].every((s,i)=>s.type==="rest"||state.completed[w+"-"+i])){b.push("w1");break}}
  let longs=0,z2s=0;
  Object.keys(state.completed).forEach(k=>{const[w,d]=k.split("-").map(Number);const s=SCH[w]?.[d];if(s?.type==="long")longs++;if(s?.zone?.includes("Z2"))z2s++});
  if(longs>=5)b.push("longmaster");if(z2s>=30)b.push("z2master");
  if(state.completed["10-5"]||state.completed["12-5"])b.push("halfready");
  if(state.completed["13-6"])b.push("finisher");
  let mx=0,c=0;
  for(let w=1;w<=13;w++)for(let d=0;d<7;d++){const s=SCH[w]?.[d];if(state.completed[w+"-"+d]||s?.type==="rest")c++;else c=0;if(c>mx)mx=c}
  if(mx>=3)b.push("streak3");if(mx>=7)b.push("streak7");
  return[...new Set(b)];
}
let prevBadges=getEarned();

function showToast(badge){
  const c=document.getElementById("toast-container");
  c.innerHTML=`<div class="toast"><div class="toast-inner"><span style="font-size:36px">${badge.i}</span><div><div style="font-size:10px;color:#F59E0B;font-weight:600;letter-spacing:.1em;text-transform:uppercase">Achievement unlocked!</div><div style="font-size:15px;font-weight:500;margin-top:2px">${badge.n}</div><div style="font-size:12px;color:var(--tx2)">${badge.d}</div></div></div></div>`;
  setTimeout(()=>c.innerHTML="",3500);
}

function checkBadges(){
  const earned=getEarned();
  const nw=earned.filter(b=>!prevBadges.includes(b));
  if(nw.length)showToast(BADGES.find(b=>b.id===nw[0]));
  prevBadges=earned;
}

    html+=`<div class="wk-scroll">${Array.from({length:13},(_,i)=>{const wk=i+1,ad=SCH[wk].every((s,idx)=>s.type==="rest"||state.completed[wk+"-"+idx]),p=getPhase(wk);return`<button class="wk-btn ${wk===w?"on":""}" style="border-color:${wk===w?p.c:"var(--bd)"};color:${wk===w||ad?p.c:"var(--tx2)"};${ad&&wk!==w?`background:${p.c}20`:""}" onclick="setWeek(${wk})">${wk}${ad?"<span style='font-size:8px'>✓</span>":""}</button>`}).join("")}</div>`;
    html+=`<div class="card" style="display:flex;align-items:center;justify-content:space-between"><div><div style="font-size:15px;font-weight:500">Minggu ${w}</div><div style="font-size:12px;color:var(--tx2);margin-top:2px">${wkKm} km · ${wkDone}/7 selesai</div></div><div class="ring"><svg viewBox="0 0 48 48"><circle cx="24" cy="24" r="20" fill="none" stroke="var(--s0)" stroke-width="4"/><circle cx="24" cy="24" r="20" fill="none" stroke="${phase.c}" stroke-width="4" stroke-dasharray="${(wkDone/7)*126} 126" stroke-linecap="round" transform="rotate(-90 24 24)"/></svg><span>${Math.round((wkDone/7)*100)}%</span></div></div>`;
    html+=days.map((ses,idx)=>{
      const k=w+"-"+idx,done=!!state.completed[k],t=TS[ses.type],isR=ses.type==="rest",hasAI=!!state.analyses[k];
      return`<div class="day ${done?"done":""}" onclick="openDay(${idx})"><div class="chk ${done?"on":""} ${isR?"rest":""}" style="${done?`background:${t.a}`:""}" onclick="event.stopPropagation();${isR?"":"toggleDone("+w+","+idx+")"}">${done?'<svg width="14" height="14" viewBox="0 0 14 14"><path d="M3 7l3 3 5-5" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>':""}</div><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:6px"><span style="font-size:12px;color:var(--tx3);min-width:28px">${DN[idx]}</span><span style="font-size:15px">${t.i}</span><span style="font-size:13px;font-weight:500;color:${done?"var(--tx2)":t.a}">${t.l}</span></div>${ses.km>0?`<div style="display:flex;gap:12px;font-size:12px;color:var(--tx2);margin-top:2px"><span style="font-weight:500">${ses.km} km</span><span>${ses.time} mnt</span><span>${ses.pace}/km</span><span style="font-size:10px;font-weight:500;padding:1px 6px;border-radius:6px;background:${(ZD[ses.zone?.substring(0,2)]||ZD.Z2).c}20;color:${(ZD[ses.zone?.substring(0,2)]||ZD.Z2).c}">${ses.zone}</span></div>`:""}</div><div style="display:flex;align-items:center;gap:4px;flex-shrink:0">${hasAI?`<span style="font-size:9px;font-weight:600;padding:2px 5px;border-radius:6px;background:${t.a}15;color:${t.a}">AI</span>`:""}<svg width="16" height="16" viewBox="0 0 16 16" style="opacity:.3"><path d="M6 4l4 4-4 4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div></div>`
    }).join("");
  }
  app.innerHTML=html;
}

function setTab(t){state.tab=t;save();render()}
function setWeek(w){state.week=w;save();render()}
function toggleDone(w,d){const k=w+"-"+d;state.completed[k]?delete state.completed[k]:state.completed[k]=Date.now();save();checkBadges();render()}

function openDay(idx){
  const w=state.week,ses=SCH[w][idx],t=TS[ses.type],k=w+"-"+idx;
  const done=!!state.completed[k],an=state.analyses[k],st=state.stats[k];
  const pre=PRERUN[ses.type]||[],post=POSTRUN[ses.type]||[];
  const sheet=document.getElementById("sheet");

  let h=`<div class="sheet-handle"><div></div></div>`;
  // Header
  h+=`<div class="sheet-head" style="background:${t.g}"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-size:11px;color:${t.d};opacity:.7;font-weight:500">Minggu ${w} · ${DF[idx]}</div><div style="font-size:22px;font-weight:500;color:${t.d};margin-top:4px;display:flex;align-items:center;gap:8px"><span style="font-size:28px">${t.i}</span>${t.l}</div></div><button onclick="closeSheet()" style="width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,255,255,.5);cursor:pointer;font-size:16px;color:${t.d};display:flex;align-items:center;justify-content:center">×</button></div>`;
  if(ses.km>0){
    h+=`<div style="display:flex;gap:16px;margin-top:16px">${[["Jarak",ses.km+" km"],["Waktu",ses.time+"'"],["Pace",ses.pace+"/km"],["Zone",ses.zone]].map(([l,v])=>`<div><div style="font-size:10px;color:${t.d};opacity:.6;text-transform:uppercase;letter-spacing:.05em">${l}</div><div style="font-size:16px;font-weight:500;color:${t.d};margin-top:2px">${v}</div></div>`).join("")}</div>`;
  }
  h+=`</div>`;

  // HR Zone bar
  if(ses.zone&&ses.zone!=="-"){
    h+=`<div style="margin:0 16px 16px;padding:14px 16px;background:var(--s2);border-radius:12px;border:.5px solid var(--bd)"><div style="font-size:12px;color:var(--tx3);margin-bottom:10px;font-weight:500">Heart rate target</div><div class="zone-bar">${["Z1","Z2","Z3","Z4","Z5"].map(z=>`<div class="zone-seg" style="background:${ses.zone.includes(z)?ZD[z].c:"var(--s0)"};opacity:${ses.zone.includes(z)?1:.3}"></div>`).join("")}</div><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--tx3)">${["Z1","Z2","Z3","Z4","Z5"].map(z=>`<span style="font-weight:${ses.zone.includes(z)?500:400};color:${ses.zone.includes(z)?ZD[z].c:"var(--tx3)"}">${z}</span>`).join("")}</div>`;
    if(ses.zone.includes("Z2"))h+=`<div style="margin-top:8px;font-size:13px">Jaga HR di <strong style="color:#10B981">119–139 bpm</strong>. Jika >139, turunkan pace!</div>`;
    if(ses.zone==="Z3")h+=`<div style="margin-top:8px;font-size:13px">Target HR <strong style="color:#FBBF24">139–158 bpm</strong>. Terkontrol!</div>`;
    h+=`</div>`;
  }

  // Detail
  h+=`<div style="margin:0 16px 16px;padding:14px 16px;background:var(--s2);border-radius:12px;border:.5px solid var(--bd);font-size:14px;line-height:1.7">${ses.detail}</div>`;

  // Pre-run
  if(pre.length){
    h+=`<div style="margin:0 16px 16px"><div style="font-size:13px;font-weight:500;color:var(--tx2);margin-bottom:8px">🔆 Pre-run warm-up</div><div style="background:var(--s2);border-radius:12px;border:.5px solid var(--bd);overflow:hidden">${pre.map(([n,d,desc],i)=>`<div class="prepost-item"><div class="prepost-num" style="background:${t.g};color:${t.d}">${i+1}</div><div style="flex:1"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;font-weight:500">${n}</span><span style="font-size:11px;color:${t.a};font-weight:500;background:${t.g};padding:2px 8px;border-radius:8px">${d}</span></div><div style="font-size:12px;color:var(--tx2);margin-top:2px;line-height:1.5">${desc}</div></div></div>`).join("")}</div></div>`;
  }

  // Splits
  if(ses.splits?.length){
    h+=`<div style="margin:0 16px 16px"><div style="font-size:13px;font-weight:500;color:var(--tx2);margin-bottom:8px">📍 Breakdown per kilometer</div><div style="background:var(--s2);border-radius:12px;border:.5px solid var(--bd);overflow:hidden">${ses.splits.map((sp,i)=>{const zk=sp.z.replace(/[-→]/g,"").trim().substring(0,2);const zc=(ZD[zk]||ZD.Z2).c;return`<div class="split-row"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><div style="display:flex;align-items:center;gap:8px"><div style="width:8px;height:8px;border-radius:50%;background:${zc}"></div><span style="font-size:13px;font-weight:500">KM ${sp.a}${sp.b>sp.a?"–"+sp.b:""}</span></div><div style="display:flex;gap:8px;align-items:center"><span style="font-size:11px;color:${zc};font-weight:500;padding:2px 8px;background:${zc}15;border-radius:8px">${sp.z}</span><span style="font-size:12px;color:var(--tx2);font-weight:500">${sp.p}/km</span></div></div><div style="font-size:12px;color:var(--tx2);line-height:1.5;padding-left:16px">${sp.inst}</div></div>`}).join("")}</div></div>`;
  }

  // Post-run
  if(post.length){
    h+=`<div style="margin:0 16px 16px"><div style="font-size:13px;font-weight:500;color:var(--tx2);margin-bottom:8px">🧊 Post-run cooldown</div><div style="background:var(--s2);border-radius:12px;border:.5px solid var(--bd);overflow:hidden">${post.map(([n,d,desc],i)=>`<div class="prepost-item"><div class="prepost-num" style="background:var(--s0);color:var(--tx2)">${i+1}</div><div style="flex:1"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;font-weight:500">${n}</span><span style="font-size:11px;color:var(--tx3);background:var(--s0);padding:2px 8px;border-radius:8px">${d}</span></div><div style="font-size:12px;color:var(--tx2);margin-top:2px;line-height:1.5">${desc}</div></div></div>`).join("")}</div></div>`;
  }

  // Stats upload & AI
  if(ses.type!=="rest"&&ses.type!=="cross"){
    h+=`<div style="margin:0 16px 16px" id="stats-section"><button onclick="document.getElementById('stats-expand').style.display=document.getElementById('stats-expand').style.display==='none'?'block':'none'" style="width:100%;padding:14px 16px;border-radius:12px;border:${an?"1.5px solid "+t.a+"50":".5px solid var(--bd)"};background:${an?t.a+"08":"var(--s2)"};cursor:pointer;display:flex;align-items:center;justify-content:space-between"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:16px">📊</span><div style="text-align:left"><div style="font-size:13px;font-weight:500;color:var(--tx)">${an?"Lihat analisa AI":"Upload statistik lari"}</div>${st?`<div style="font-size:11px;color:var(--tx2);margin-top:1px">${st.avgHr?"HR "+st.avgHr:""}${st.avgPace?" · "+st.avgPace+"/km":""}${st.distance?" · "+st.distance+" km":""}</div>`:""}</div></div><svg width="16" height="16" viewBox="0 0 16 16"><path d="M4 6l4 4 4-4" fill="none" stroke="var(--tx3)" stroke-width="1.5" stroke-linecap="round"/></svg></button>`;
    h+=`<div id="stats-expand" style="display:none;margin-top:8px;padding:16px;border-radius:12px;background:var(--s2);border:.5px solid var(--bd)">`;
    h+=`<div style="font-size:12px;font-weight:500;color:var(--tx2);margin-bottom:8px">Screenshot Garmin / Strava</div>`;
    h+=`<input type="file" accept="image/*" id="img-input" onchange="handleImg(this)" style="display:none">`;
    h+=`<button class="upload-btn" id="upload-btn" onclick="document.getElementById('img-input').click()">📷 Upload screenshot</button>`;
    h+=`<div style="font-size:12px;font-weight:500;color:var(--tx2);margin:14px 0 8px">Atau input manual</div>`;
    h+=`<div class="input-grid">${[["avgHr","Avg HR (bpm)","135","❤️"],["maxHr","Max HR (bpm)","155","💓"],["avgPace","Avg Pace","6:30","⏱️"],["distance","Jarak (km)","7.2","📏"]].map(([f,l,p,ic])=>`<div class="field"><label>${ic} ${l}</label><input id="f-${f}" type="text" placeholder="${p}" value="${st?.[f]||""}"></div>`).join("")}</div>`;
    h+=`<div class="field" style="margin-bottom:14px"><label>📝 Catatan</label><textarea id="f-notes" rows="2" placeholder="Kaki berat di km 5, HR drift...">${st?.notes||""}</textarea></div>`;
    h+=`<button class="btn-ai" id="ai-btn" style="background:linear-gradient(135deg,${t.a},${t.d})" onclick="runAI(${w},${idx})"><svg width="16" height="16" viewBox="0 0 16 16"><path d="M8 1v6M8 15v-4M1 8h4M15 8h-4M3.5 3.5l2 2M12.5 12.5l-2-2M3.5 12.5l2-2M12.5 3.5l-2 2" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg> Analisa dengan AI</button>`;
    if(an){
      h+=`<div class="analysis-box" style="background:linear-gradient(135deg,${t.a}08,${t.a}15);border:1px solid ${t.a}30"><div style="display:flex;align-items:center;gap:6px;margin-bottom:10px"><svg width="16" height="16" viewBox="0 0 16 16"><path d="M8 1v6M8 15v-4M1 8h4M15 8h-4M3.5 3.5l2 2M12.5 12.5l-2-2M3.5 12.5l2-2M12.5 3.5l-2 2" stroke="${t.a}" stroke-width="1.5" stroke-linecap="round"/></svg><span style="font-size:12px;font-weight:600;color:${t.a};text-transform:uppercase;letter-spacing:.05em">AI Coach Analysis</span></div><div style="color:var(--tx)">${an.replace(/\*\*([^*]+)\*\*/g,'<strong style="color:'+t.d+'">$1</strong>').replace(/\n/g,"<br>")}</div>${st?.timestamp?`<div style="font-size:10px;color:var(--tx3);margin-top:10px;text-align:right">Dianalisa ${new Date(st.timestamp).toLocaleDateString("id-ID",{day:"numeric",month:"short"})}</div>`:""}<button class="btn-ai" style="margin-top:10px;background:transparent;border:.5px solid ${t.a}40;color:${t.a};font-size:12px;padding:10px" onclick="runAI(${w},${idx})">🔄 Analisa ulang</button></div>`;
    }
    h+=`</div></div>`;
  }

  // Complete button
  if(ses.type!=="rest"){
    h+=`<div style="padding:0 16px 32px"><button class="btn-done" style="background:${done?"var(--s0)":t.a};color:${done?"var(--tx2)":"white"}" onclick="toggleDone(${w},${idx});closeSheet()">${done?"Tandai belum selesai":"Selesai "+t.l+"!"}</button></div>`;
  }

  sheet.innerHTML=h;
  requestAnimationFrame(()=>{
    document.getElementById("overlay").classList.add("show");
    sheet.classList.add("show");
  });
}

function closeSheet(){
  document.getElementById("overlay").classList.remove("show");
  document.getElementById("sheet").classList.remove("show");
  setTimeout(render,200);
}

let uploadedImg=null;
function handleImg(input){
  const f=input.files?.[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    uploadedImg={data:e.target.result.split(",")[1],type:f.type,name:f.name};
    const btn=document.getElementById("upload-btn");
    btn.className="upload-btn has";
    btn.innerHTML="✅ "+f.name.substring(0,30);
  };
  r.readAsDataURL(f);
}

async function runAI(w,idx){
  const ses=SCH[w][idx],t=TS[ses.type],k=w+"-"+idx;
  const btn=document.getElementById("ai-btn");
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span> AI sedang menganalisa...';

  const stats={avgHr:document.getElementById("f-avgHr")?.value||"",maxHr:document.getElementById("f-maxHr")?.value||"",avgPace:document.getElementById("f-avgPace")?.value||"",distance:document.getElementById("f-distance")?.value||"",notes:document.getElementById("f-notes")?.value||""};

  const prompt=`KONTEKS: Pelari 22 thn, MHR 198. Minggu ${w}/13 HM training. ${DF[idx]} - ${t.l}. Target: ${ses.km}km, ${ses.time}mnt, pace ${ses.pace}/km, zona ${ses.zone}. Z2=119-139bpm.
DATA AKTUAL: ${stats.avgHr?"Avg HR:"+stats.avgHr:""}${stats.maxHr?" Max HR:"+stats.maxHr:""} ${stats.avgPace?"Pace:"+stats.avgPace+"/km":""}${stats.distance?" Jarak:"+stats.distance+"km":""} ${stats.notes?"Catatan:"+stats.notes:""}
TUGAS: Analisa sebagai running coach. Bahasa Indonesia, maks 200 kata:
1. **VERDICT**: Berhasil/perlu perbaikan?
2. **HR ANALYSIS**: Sudah di zona target?
3. **PACE ANALYSIS**: Aerobic base berkembang?
4. **TIPS**: 2-3 saran spesifik.
5. **SCORE**: 1-10.
Supportive tapi jujur. Pakai emoji.`;

  const content=[];
  if(uploadedImg){
    content.push({type:"image",source:{type:"base64",media_type:uploadedImg.type,data:uploadedImg.data}});
    content.push({type:"text",text:"Ini screenshot stats lari. Ekstrak data & analisa.\n\n"+prompt});
  } else {
    content.push({type:"text",text:prompt});
  }

  const apiKey=state.apiKey;
  if(!apiKey){
    state.analyses[k]="⚠️ API key belum diisi!\n\nMasukkan Anthropic API key di tab **Statistik** (scroll ke bawah) untuk menggunakan fitur AI Coach.\n\nDapatkan API key gratis di: console.anthropic.com";
    state.stats[k]={...stats,timestamp:Date.now()};
    save();openDay(idx);return;
  }

  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content}]})
    });
    const data=await res.json();
    if(data.error){
      state.analyses[k]="❌ Error: "+(data.error.message||"Cek API key & coba lagi.");
    } else {
      state.analyses[k]=data.content?.map(c=>c.text||"").join("\n")||"Tidak bisa menganalisa.";
    }
  }catch(err){
    state.analyses[k]="❌ Error: "+err.message;
  }
  state.stats[k]={...stats,timestamp:Date.now(),hasImage:!!uploadedImg};
  uploadedImg=null;
  save();openDay(idx);
}

// Service worker
if("serviceWorker" in navigator){navigator.serviceWorker.register("./sw.js").catch(()=>{})}

render();
</script>
</body>
</html>
